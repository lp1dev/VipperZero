<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRUTALIST HELLO WORLD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* chaotic blinking header */
        .glitch-title {
            font-size: 3rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 2rem;
            padding: 10px 20px;
            border: 3px solid #fff;
            display: inline-block;
            animation: glitch-text 0.2s steps(1, end) infinite;
            background: #000;
            color: #fff;
        }

        @keyframes glitch-text {
            0%   { color: #ff0000; transform: translate(2px, 0); }
            20%  { color: #00ff00; transform: translate(-2px, 1px); }
            40%  { color: #0000ff; transform: translate(0, -1px); }
            60%  { color: #ff0000; transform: translate(-1px, -2px); }
            80%  { color: #00ff00; transform: translate(2px, 2px); }
            100% { color: #0000ff; transform: translate(0, 0); }
        }

        .container {
            width: 80%;
            max-width: 700px;
            border: 4px solid #fff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #000;
            position: relative;
        }

        /* base box style – no smooth transitions anywhere */
        .box {
            height: 50px;
            border: 3px solid #fff;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding-left: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            color: #000;
            white-space: nowrap;
            overflow: hidden;
            /* all width animations use steps(1) for instant jumps */
            animation-timing-function: steps(1, start);
            animation-iteration-count: infinite;
        }

        /* individual colors */
        .red {
            background-color: #ff0000;
        }
        .green {
            background-color: #00ff00;
        }
        .blue {
            background-color: #0000ff;
            color: #fff; /* blue needs white text for contrast */
        }

        /* chaotic width animations – pure glitch, no smoothness */
        .box:nth-child(1) {
            animation-name: glitch-width-1;
            animation-duration: 0.7s;
        }
        .box:nth-child(2) {
            animation-name: glitch-width-2;
            animation-duration: 1.2s;
        }
        .box:nth-child(3) {
            animation-name: glitch-width-3;
            animation-duration: 0.4s;
        }
        .box:nth-child(4) {
            animation-name: glitch-width-4;
            animation-duration: 0.9s;
        }

        @keyframes glitch-width-1 {
            0%   { width: 0%; }
            10%  { width: 100%; }
            11%  { width: 15%; }
            22%  { width: 0%; }
            33%  { width: 70%; }
            44%  { width: 0%; }
            55%  { width: 100%; }
            66%  { width: 0%; }
            77%  { width: 85%; }
            88%  { width: 0%; }
            100% { width: 100%; }
        }

        @keyframes glitch-width-2 {
            0%   { width: 100%; }
            5%   { width: 0%; }
            15%  { width: 100%; }
            20%  { width: 30%; }
            30%  { width: 0%; }
            40%  { width: 80%; }
            50%  { width: 0%; }
            60%  { width: 100%; }
            65%  { width: 10%; }
            75%  { width: 0%; }
            85%  { width: 100%; }
            90%  { width: 0%; }
            100% { width: 0%; }
        }

        @keyframes glitch-width-3 {
            0%   { width: 0%; }
            7%   { width: 50%; }
            14%  { width: 0%; }
            21%  { width: 100%; }
            28%  { width: 0%; }
            35%  { width: 90%; }
            42%  { width: 0%; }
            50%  { width: 10%; }
            57%  { width: 0%; }
            64%  { width: 100%; }
            71%  { width: 20%; }
            78%  { width: 0%; }
            85%  { width: 100%; }
            92%  { width: 0%; }
            100% { width: 0%; }
        }

        @keyframes glitch-width-4 {
            0%   { width: 30%; }
            12%  { width: 0%; }
            25%  { width: 100%; }
            37%  { width: 0%; }
            50%  { width: 65%; }
            62%  { width: 0%; }
            75%  { width: 100%; }
            87%  { width: 5%; }
            100% { width: 0%; }
        }

        /* extra brutalist button – no smooth hover, instant */
        .brutal-btn {
            margin-top: 1.5rem;
            padding: 12px 24px;
            font-size: 1.5rem;
            font-weight: bold;
            font-family: inherit;
            text-transform: uppercase;
            background: #ff0000;
            color: #000;
            border: 3px solid #fff;
            cursor: pointer;
            transition: none; /* absolutely no smoothness */
        }

        .brutal-btn:hover {
            background: #00ff00;
            color: #000;
            border-color: #0000ff;
        }

        .brutal-btn:active {
            background: #0000ff;
            color: #fff;
        }
    </style>
</head>
<body>
    <h1 class="glitch-title">HELLO WORLD</h1>

    <div class="container">
        <div class="box red">hello world</div>
        <div class="box green">hello world</div>
        <div class="box blue">hello world</div>
        <div class="box red">hello world</div>
    </div>

    <button class="brutal-btn">HELLO WORLD</button>
</body>
</html>
