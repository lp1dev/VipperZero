<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRUTALIST HELLO WORLD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Glitch title – slower, safer color jumps (one change per second) */
        .glitch-title {
            font-size: 3rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 2rem;
            padding: 10px 20px;
            border: 3px solid #fff;
            display: inline-block;
            background: #000;
            color: #ff0000;
            animation: glitch-text 4s steps(1, end) infinite;
            /* No rapid transforms to avoid motion sickness */
        }

        @keyframes glitch-text {
            0%   { color: #ff0000; }
            25%  { color: #00ff00; }
            50%  { color: #0000ff; }
            75%  { color: #ff0000; }
            100% { color: #00ff00; }
            /* Only 4 color changes over 4 seconds – safe, glitchy */
        }

        .container {
            width: 80%;
            max-width: 700px;
            border: 4px solid #fff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #000;
            position: relative;
        }

        .box {
            height: 50px;
            border: 3px solid #fff;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding-left: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            color: #000;
            white-space: nowrap;
            overflow: hidden;
            animation-timing-function: steps(1, start);
            animation-iteration-count: infinite;
        }

        .red {
            background-color: #ff0000;
        }
        .green {
            background-color: #00ff00;
        }
        .blue {
            background-color: #0000ff;
            color: #fff; /* better contrast */
        }

        /* Slower, glitchy width animations – maximum two flashes per cycle */
        .box:nth-child(1) {
            animation-name: glitch-w1;
            animation-duration: 2.5s;
        }
        .box:nth-child(2) {
            animation-name: glitch-w2;
            animation-duration: 3.2s;
        }
        .box:nth-child(3) {
            animation-name: glitch-w3;
            animation-duration: 1.8s;
        }
        .box:nth-child(4) {
            animation-name: glitch-w4;
            animation-duration: 4.0s;
        }

        @keyframes glitch-w1 {
            0%   { width: 0%; }
            35%  { width: 100%; }
            65%  { width: 100%; } /* hold at full */
            70%  { width: 0%; }
            100% { width: 0%; }
        }

        @keyframes glitch-w2 {
            0%   { width: 100%; }
            15%  { width: 0%; }
            45%  { width: 0%; }
            50%  { width: 100%; }
            80%  { width: 100%; }
            85%  { width: 0%; }
            100% { width: 0%; }
        }

        @keyframes glitch-w3 {
            0%   { width: 30%; }
            20%  { width: 0%; }
            40%  { width: 0%; }
            45%  { width: 100%; }
            75%  { width: 100%; }
            80%  { width: 10%; }
            100% { width: 0%; }
        }

        @keyframes glitch-w4 {
            0%   { width: 0%; }
            10%  { width: 60%; }
            30%  { width: 0%; }
            60%  { width: 0%; }
            65%  { width: 100%; }
            90%  { width: 100%; }
            95%  { width: 0%; }
            100% { width: 0%; }
        }

        /* Brutalist button – instant color changes, no smooth transitions */
        .brutal-btn {
            margin-top: 1.5rem;
            padding: 12px 24px;
            font-size: 1.5rem;
            font-weight: bold;
            font-family: inherit;
            text-transform: uppercase;
            background: #ff0000;
            color: #000;
            border: 3px solid #fff;
            cursor: pointer;
            transition: none;
        }

        .brutal-btn:hover {
            background: #00ff00;
            color: #000;
            border-color: #0000ff;
        }

        .brutal-btn:active {
            background: #0000ff;
            color: #fff;
        }
    </style>
</head>
<body>
    <h1 class="glitch-title">HELLO WORLD</h1>

    <div class="container">
        <div class="box red">hello world</div>
        <div class="box green">hello world</div>
        <div class="box blue">hello world</div>
        <div class="box red">hello world</div>
    </div>

    <button class="brutal-btn">HELLO WORLD</button>
</body>
</html>
