<!DOCTYPE html>
<html>

<head>
  <title>Vipper Zero</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div id="header-container">
    <div id="header">Vipper Zero | Version 00.01 </div>
  </div>
  <div id="notification"></div>

  <div id="container-small" class="inline">
    <div id="menu">

  </div>

  </div>


  <div id="footer">Pre-Release Version | Not production-ready</div>

  <script type="text/javascript">
    // Navigation
    var page = 0
    var files = []
    var displayed = []
    var menu_selected = 0
    var max_menu_items = 8 // In this menu we can only display 8 items at a time

    function draw_menu(files) {
      var new_content = '<div id="files-list"></div>'
      displayed = files

      document.getElementById("menu").innerHTML = new_content
      new_content = ""
      for (var i = 0; i < files.length; i++) {
        new_content += '<div class="file-item" id="menuitem'
        new_content += i + '">' + files[i] + "</div>"
      }
      document.getElementById("files-list").innerHTML = new_content + "</div>"
    }

    function menu_select() {
      var cmd = "subsend 1 " + displayed[menu_selected]
      console.log("CMD: "+cmd)
      var bytes_sent = serial_send(cmd)
      var output = read_buffer_until_OK(30)
      console.log('Output: '+output)
    }

    function menu_move(direction) {
      var selected_item = document.getElementById('menuitem'+menu_selected)
      selected_item.style.backgroundColor = '#2c2c2d'

      if (direction === "DOWN") {
        if (menu_selected >= displayed.length - 1) {
          if (page < ((files.length / max_menu_items) | 0)) {
            page++
          } else {
            page = 0
          }
          draw_menu(files.slice(page * max_menu_items, (page + 1) * max_menu_items))
          menu_selected = 0
        } else {
          menu_selected++
        }
      } else {
        if (menu_selected <= 0) {
          if (page > 0) {
            page--
          } else if (page <= 0) {
            page = (files.length / max_menu_items) | 0 
          }
          draw_menu(files.slice(page * max_menu_items, (page + 1) * max_menu_items))
          menu_selected = page <= 0 ? (displayed.length - 1) : 0
        } else {
          menu_selected--
        }
      }

      selected_item = document.getElementById('menuitem'+menu_selected)
      selected_item.style.backgroundColor = '#06B6D4'
    }

    function read_buffer_until_OK(timeout) {
      var buffer = serial_recv(timeout)
      var data = buffer
      var i = 0
      while (!data.includes("OK") && !data.includes("ERR") && i < 3) {
        buffer = serial_recv(timeout)
        if (buffer) {
          data += buffer
        } else {
          i++ // If we have more that 3 empty recv() we stop
        }
      }
      return data
    }


    function sdr_list_subfiles() {
      var bytes_sent = serial_send("sublist")
      var subfiles = read_buffer_until_OK(30)
      files = [] // We reset files to an empty array

      subfiles = subfiles.split('\n')
      for (var i = 1; i + 1 < subfiles.length; i++) {
        var subfile = subfiles[i].trim().split(' ')
        var filename = ""
        for (var j = 0; j + 2 < subfile.length; j++) {
          filename += subfile[j]
        }
        files.push(filename)
      }
      draw_menu(files.slice(0, max_menu_items))
      console.log(files)
    }

    document.addEventListener('keydown', function (event) {
      console.log("Key pressed", event)
      if (event.code === 1073741906) {
        menu_move("UP")
      } else if (event.code === 1073741905) {
        menu_move("DOWN")
      } else if (event.code === 27) {
        serial_close()
        window.location = "sdr.html"
      } else if (event.code === 13) {
        menu_select()
      }
    })

    var mapping = [
      "X",
      "CIRCLE",
      "SQUARE",
      "TRIANGLE",
      "SHARE",
      "PS",
      "OPTIONS",
      "LEFTSTICK",
      "RIGHTSTICK",
      "LEFTSHOULDER",
      "RIGHTSHOULDER",
      "DPAD_UP",
      "DPAD_DOWN",
      "DPAD_LEFT",
      "DPAD_RIGHT",
    ] // Only implemented the first 15 buttons

    document.addEventListener("gamepadconnected", function (event) {
      navigator.getGamepads()
      // To initialize the gamepad
    })

    document.addEventListener('button_press', function (event) {
      // The "button_press" event is not a classic JS event
      // but it is a custom quark optimization for the non-existent gamepad
      // button press event which usually requires a setTimeout +
      // polling of all the gamepads that is done in JS.
      if (mapping[event.code] === "DPAD_UP") {
        menu_move("UP")
      } else if (mapping[event.code] === "DPAD_DOWN") {
        menu_move("DOWN")
      } else if (mapping[event.code] == "TRIANGLE") {
        serial_close()
        window.location = "sdr.html"
      } else if (mapping[event.code] == "X") {
        menu_select()
      }

    })

    sdr_list_subfiles()
    document.getElementById('menuitem'+menu_selected).style.backgroundColor = '#06B6D4'

  </script>

</body>
</html>
