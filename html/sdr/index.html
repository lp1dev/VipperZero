<!DOCTYPE html>
<html>

<head>
  <title>Vipper Zero</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div id="header-container">
    <div id="header">Vipper Zero | Version 00.01 </div>
  </div>
  <div id="notification"></div>

  <div id="container-small" class="inline">
    <div id="menu">
      <div class="button-container" id="menuitem0" style="background-color: #06B6D4">
        <button onclick="setLocation('./html/sdr/jammer.html')"
        class="menu-button">Jammer</button>

      </div>
      <div class="button-container" id="menuitem1">
        <button onclick="setLocation('./html/sdr/scan.html')"
        class="menu-button">Scan</button>

      </div>
      <div class="button-container" id="menuitem2">
        <button onclick="setLocation('./html/sdr/subfiles.html')"
        class="menu-button">Sub Files</button>
      </div>

  </div>

  </div>


  <div id="footer">Pre-Release Version | Not production-ready</div>

  <script type="text/javascript">
    // Navigation
    var locations = ["./html/sdr/scan.html", "./html/sdr/scan.html", "./html/sdr/subfiles.html" ]
    var menu_selected = 0
    // Serial management
    var is_connected = false
    var sdr_status = undefined

    function setLocation(location) {
      window.location = location
    }

    function menu_select() {
      if (is_connected) {
        window.location = locations[menu_selected]
      }
    }

    function menu_move(direction) {
      if (!is_connected) {
        return
      }
      var max_items = 2
      // Because we have 3 items in the menu

      var selected_item = document.getElementById('menuitem'+menu_selected)
      selected_item.style.backgroundColor = '#34444a'

      if (direction === "UP") {
        menu_selected = (menu_selected > 0) ? menu_selected - 1 : max_items
      } else {
        menu_selected = (menu_selected < max_items) ? menu_selected + 1 : 0
      }
      selected_item = document.getElementById('menuitem'+menu_selected)
      selected_item.style.backgroundColor = '#06B6D4'
    }

    function parse_status(status) {
        var attributes = [ "firmware", "uptime_s", "cpu_mhz", "temperature", 
        "free_heap", "total_heap", "sd_present", "rx_active", 
        "jammer_active", "serial_echo" ]
        var status_obj = {}
        var value_buffer

        status = status.split('\n')
        for (var i = 1; i < status.length - 1; i++) {
            value_buffer = status[i].split(":")[1]
            if (value_buffer) {
                value_buffer = value_buffer.substr(1, value_buffer.length - 2)
                if (value_buffer == "true" || value_buffer == "false") {
                    value_buffer = (value_buffer == "true")
                } else if (!/^\d+|\.$/.test(value_buffer)) {

                } else if (parseFloat(value_buffer) != NaN) {
                    value_buffer = parseFloat(value_buffer)
                } else if (parseInt(value_buffer) != NaN) {
                    value_buffer = parseInt(value_buffer)
                }
                status_obj[attributes[i - 1]] = value_buffer
            }
        }
        return status_obj
    }

    function read_buffer_until_OK(timeout) {
      var buffer = serial_recv(timeout)
      var data = buffer
      var i = 0
      
      console.log('Data buffer: ' + data)
      while (!data.includes("OK") && !data.includes("ERR") && i < 3) {
        buffer = serial_recv(timeout)
        if (buffer) {
          data += buffer
          console.log('Data buffer: ' + data)
        } else {
          i++ // If we have more that 3 empty recv() we stop
        }
      }
      return data
    }

    function sdr_init() {
        if (!serial_is_connected()) {
          serial_init()
        }
        is_connected = serial_is_connected()

        if (!is_connected) {
            document.getElementById("notification").innerText = "◉ Error: Serial is not connected"
            document.getElementById("notification").style.color = '#de4444'
            document.getElementById("menu").innerHTML = "<div id='loader'>No USB serial connection with the EvilCrowRFv2.</div>"

            return;
        } else {
            document.getElementById("notification").innerText = "◉ serial is connected"
            document.getElementById("notification").style.color = '#01EFAC'
        }

        var bytes_sent = serial_send("status")
        console.log("We have sent " + bytes_sent + " bytes")

        var status = read_buffer_until_OK(300)
        sdr_status = parse_status(status)
        console.log(sdr_status)
        document.getElementById("header").innerText += "| Serial Conn OK | Firmware v" + sdr_status.firmware 
    }

    document.addEventListener('keydown', function (event) {
      console.log("Key pressed", event)
      if (event.code === 1073741906) {
        menu_move("UP")
      } else if (event.code === 1073741905) {
        menu_move("DOWN")
      } else if (event.code === 27) {
        serial_close()
        window.location = "./html/index.html"
      } else if (event.code === 13) {
        menu_select()
      }
    })

    var mapping = [
      "X",
      "CIRCLE",
      "SQUARE",
      "TRIANGLE",
      "SHARE",
      "PS",
      "OPTIONS",
      "LEFTSTICK",
      "RIGHTSTICK",
      "LEFTSHOULDER",
      "RIGHTSHOULDER",
      "DPAD_UP",
      "DPAD_DOWN",
      "DPAD_LEFT",
      "DPAD_RIGHT",
    ] // Only implemented the first 15 buttons

    document.addEventListener("gamepadconnected", function (event) {
      navigator.getGamepads()
    })

    document.addEventListener('button_press', function (event) {
      if (mapping[event.code] === "DPAD_UP") {
        menu_move("UP")
      } else if (mapping[event.code] === "DPAD_DOWN") {
        menu_move("DOWN")
      } else if (mapping[event.code] == "TRIANGLE") {
        serial_close()
        window.location = "index.html"
      } else if (mapping[event.code] == "X") {
        menu_select()
      }

    })

    sdr_init()

  </script>

</body>
</html>
