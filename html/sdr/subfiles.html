<!DOCTYPE html>
<html>

<head>
  <title>Vipper Zero</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div id="header-container" class="inline">
    <div id="header">
      <button id="back-button" onclick="setLocation('./html/sdr/index.html')">Back</button>
      <div id="header-text">Vipper Zero | Version 00.01</div>
    </div>
  </div>

  <div id="notification" style="color: #01EFAC">◉ serial is connected</div>

  <div id="container-small" class="inline">
    <div id="menu">

    </div>

  </div>


  <div id="footer">Pre-Release Version | Not production-ready</div>

  <script type="text/javascript">
    // Navigation
    var page = 0
    var files = []
    var displayed = []
    var menu_selected = 0
    var max_menu_items = 8 // In this menu we can only display 8 items at a time

    function setLocation(location) {
      window.location = location
    }

    function draw_menu(files) {
      var new_content = '<div id="files-list"></div>'
      displayed = files

      document.getElementById("menu").innerHTML = new_content
      new_content = ""
      for (var i = 0; i < files.length; i++) {
        new_content += '<div class="file-item" id="menuitem'
        new_content += i + '">' + files[i] + "</div>"
      }
      document.getElementById("files-list").innerHTML = new_content + "</div>"
    }

    function menu_select() {
      return
      if (menu_selected > displayed.length) {
        return
      }
      var cmd = "subsend 1 " + displayed[menu_selected].replace('.sub', '') // The firmware already appends ".sub"
      console.log("CMD: " + cmd)
      quark_debug("CMD", cmd)
      setTimeout(function() {
        var bytes_sent = serial_send(cmd)
        setTimeout(function() {
          var output = read_buffer_until_OK(300)
        })
      }, 1000)
      console.log('Output: ' + output)
    }

    function menu_move(direction) {
      if (!displayed.length) {
        return
      }
      var selected_item = document.getElementById('menuitem' + menu_selected)
      selected_item.style.backgroundColor = '#2c2c2d'

      if (direction === "DOWN") {
        if (menu_selected >= displayed.length - 1) {
          console.log("files.length / max_menu_items | 0 = ")
          console.log((files.length / max_menu_items) | 0)
          if (page < ((files.length / max_menu_items) | 0) - 1) {
            page++
          } else {
            page = 0
          }
          draw_menu(files.slice(page * max_menu_items, (page + 1) * max_menu_items))
          menu_selected = 0
        } else {
          menu_selected++
        }
      } else {
        if (menu_selected <= 0) {
          if (page > 0) {
            page--
          } else if (page <= 0) {
            page = ((files.length / max_menu_items) | 0) - 1
          }
          draw_menu(files.slice(page * max_menu_items, (page + 1) * max_menu_items))
          menu_selected = page <= 0 ? (displayed.length - 1) : 0
        } else {
          menu_selected--
        }
      }
      console.log(displayed)
      selected_item = document.getElementById('menuitem' + menu_selected)
      selected_item.style.backgroundColor = '#06B6D4'
    }

    function read_buffer_until_OK(timeout) {
      var buffer = serial_recv(timeout)
      var data = buffer
      var i = 0
      while (data && !data.includes("OK") && !data.includes("ERR") && i < 2) {
        buffer = serial_recv(timeout)
        if (buffer) {
          data += buffer
        } else {
          i++ // If we have more that 10 empty recv() we stop
        }
      }
      return data
    }


    function sdr_list_subfiles() {
      document.getElementById("menu").innerHTML = "<div id='loader'>Listing .sub files on your SD card...</div>"
      var bytes_sent = serial_send("sublist")

      setTimeout(function () {
        var subfiles = read_buffer_until_OK(300)
        files = [] // We reset files to an empty array

        if (!subfiles || !subfiles.length > 1) {
          document.getElementById("menu").innerHTML = "<div id='loader'>No .sub files found.\nPlace them on your ECRF's SD card in the SUBGHZ directory.</div>"
          return
        }

        subfiles = subfiles.split('\n')
        for (var i = 1; i + 1 < subfiles.length; i++) {
          var subfile = subfiles[i].trim().split(' ')
          var filename = ""
          for (var j = 0; j + 2 < subfile.length; j++) {
            filename += subfile[j]
          }
          files.push(filename)
        }
        if (subfiles.length) {
          draw_menu(files.slice(0, max_menu_items))
          document.getElementById('menuitem' + menu_selected).style.backgroundColor = '#06B6D4'
          console.log(files)
        } else {
          document.getElementById("menu").innerHTML = "<div id='loader'>No .sub files found. Place them on your ECRF's SD card.</div>"
        }
      }, 1000)
    }

    document.addEventListener('keydown', function (event) {
      console.log("Key pressed", event)
      if (event.code === 1073741906) {
        menu_move("UP")
      } else if (event.code === 1073741905) {
        menu_move("DOWN")
      } else if (event.code === 27) {
        serial_close()
        window.location = "./html/sdr/index.html"
      } else if (event.code === 13) {
        menu_select()
      }
    })

    document.addEventListener("gamepadconnected", function (event) {
      navigator.getGamepads()
      // To initialize the gamepad
    })

    document.addEventListener('button_press', function (event) {
      // The "button_press" event is not a classic JS event
      // but it is a custom quark optimization for the non-existent gamepad
      // button press event which usually requires a setTimeout +
      // polling of all the gamepads that is done in JS.
      if (gamepad.mapping[event.code] === "DPAD_UP") {
        menu_move("UP")
      } else if (gamepad.mapping[event.code] === "DPAD_DOWN") {
        menu_move("DOWN")
      } else if (mapping[event.code] == "TRIANGLE") {
        serial_close()
        window.location = "sdr.html"
      } else if (mapping[event.code] == "X") {
        menu_select()
      }

    })

    sdr_list_subfiles()

  </script>

</body>

</html>
