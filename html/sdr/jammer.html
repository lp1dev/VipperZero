<!DOCTYPE html>
<html>

<head>
  <title>Vipper Zero</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div id="header-container" class="inline">
    <div id="header">
      <button id="back-button" onclick="setLocation('./html/sdr/index.html')">Back</button>
      <div id="header-text">Vipper Zero | Version 00.01</div>
    </div>
  </div>

  <div id="notification" style="color: #01EFAC">◉ serial is connected</div>
  <div id="container" class="inline">
    <div id="menu">
      <div class="setting-container">
        <div class="setting-label">Module</div>
        <div class="input" id="input0" onclick="readInputNumber(0, true)">1</div>
      </div>

      <div class="setting-container">
        <div class="setting-label">Frequency</div>
        <div class="input" id="input1" onclick="readInputNumber(1, true)">433.0</div>
      </div>

      <div class="setting-container">
        <div class="setting-label">Power</div>
        <div class="input" id="input2" onclick="readInputNumber(2, true)">1</div>
      </div>

      <div class="spacer"></div>

      <div class="button-container" id="main-button">
        <button onclick="startJamming()" class="menu-button">Start Jammer</button>
      </div>

    </div>

  </div>
  <div id="footer">Pre-Release Version | Not production-ready</div>

  <script type="text/javascript">

    var alpha = "abcdefghijklmnopqrstuvwxyz"
    var kb_buffer = ""
    var readInputCallback = undefined
    var settings_default = {
      "Module": 1,
      "Frequency": 433.07,
      "Power": 1
    }
    var settings = settings_default

    var waiting_for_input = -1

    function setLocation(location) {
      window.location = location
    }

    function notify(value, error) {
      document.getElementById("notification").innerText = value
      if (error) {
        document.getElementById("notification").style.color = '#de4444'
      } else {
        document.getElementById("notification").style.color = '#01EFAC'
      }
    }

    function startJamming() {
      console.log("STARTING TO JAM!!!")
      // Checking values
      if (settings["Module"] != 1 && settings["Module"] != 2) {
        settings["Module"] = settings_default["Module"]
        return notify("Module must be 1 or 2!", true)
      }
      if (settings["Power"] < 1 || settings["Power"] > 12) {
        settings["Power"] = settings_default["Power"]
        return notify("Power must be between 1 and 12!", true)
      }
      ///
      var cmd = "jammer " + settings["Module"] + " " + settings["Frequency"] + " " + settings["Power"]
      console.log("CMD: " + cmd)
      var bytes_sent = serial_send(cmd)
      var output = read_buffer_until_OK(30)
      notify("◉ Jammer running on module " + settings["Module"])
      console.log('Output: ' + output)
      document.getElementById('main-button').innerHTML = '<button onclick="stopJamming()" class="menu-button">Stop Jammer</button>'
    }

    function stopJamming() {
      var cmd = "stopjammer"
      var bytes_sent = serial_send(cmd)
      var output = read_buffer_until_OK(30)
      console.log("StopJammer returned " + output)
    }

    function readInputNumber(id) {
      document.getElementById('input' + id).style.color = '#2082A6'
      document.getElementById('input' + id).innerText = '|'
      waiting_for_input = id
      readInputCallback = function (cancelled) {

        document.getElementById('input' + id).innerText = kb_buffer
        document.getElementById('input' + id).style.color = '#000000'
        if (cancelled) {
          document.getElementById('input' + id).innerText = "" + settings[Object.keys(settings_default)[id]]
        } else {
            console.log('Input callback ' + kb_buffer)
            if (!isNaN(parseInt(kb_buffer))) {
              if (!kb_buffer.includes(".")) {
                settings[Object.keys(settings_default)[id]] = parseInt(kb_buffer)
              } else {
                settings[Object.keys(settings_default)[id]] = parseFloat(kb_buffer)
              }
              document.getElementById('input' + id).innerText = kb_buffer
            } else {
              document.getElementById('input' + id).innerText = "" + settings[Object.keys(settings_default)[id]]
            }
            console.log(settings)
          }
        waiting_for_input = -1
        kb_buffer = ""
      }
    }


    function setValue(id) {
      var key = Object.keys(settings_default)[id]
      console.log(typeof (settings_default[key]))
      if (typeof (settings_default[key]) === "string" || typeof (settings_default[key] == "number")) {
        if (quark_get_platform() === platforms.VITA) {
          settings[key] = prompt(key, settings_default[key])
        } else if (quark_get_platform() === platforms.LINUX) {
          readInputNumber(id)
        }
      }
      if (waiting_for_input < 0) {
        quark_writefile(JSON.stringify(settings), 'settings.json')
        menu_build(settings)
      }
    }

    function read_buffer_until_OK(timeout) {
      var buffer = serial_recv(timeout)
      var data = buffer
      var i = 0
      while (data && !data.includes("OK") && !data.includes("ERR") && i < 10) {
        buffer = serial_recv(timeout)
        if (buffer) {
          data += buffer
        } else {
          i++ // If we have more that 10 empty recv() we stop
        }
      }
      return data
    }

    document.addEventListener('keydown', function (event) {
      console.log("Key pressed", event)
      if (waiting_for_input >= 0) {
        if (event.code >= 97 && event.code <= 122) {
          kb_buffer += alpha[event.code - 97]
          document.getElementById('input'+waiting_for_input).innerText = kb_buffer
        } else if (event.code >= 48 && event.code <= 57) {
          kb_buffer += ("" + event.code - 48)
          document.getElementById('input'+waiting_for_input).innerText = kb_buffer
        } else if (event.code == 13) {
          readInputCallback(false)
        } else if (event.code == 27) {
          readInputCallback(true)
        } else if (event.code == 46) {
          kb_buffer += "."
          document.getElementById('input'+waiting_for_input).innerText = kb_buffer
        }
        return
      }

      if (event.code === 27) {
        serial_close()
        window.location = "./html/sdr/index.html"
      } else if (event.code === 13) {
        startJamming()
      }
    })

    document.addEventListener("gamepadconnected", function (event) {
      navigator.getGamepads()
    })

    document.addEventListener('button_press', function (event) {
      if (mapping[event.code] == "TRIANGLE") {
        serial_close()
        window.location = "./html/sdl/index.html"
      } else if (mapping[event.code] == "X") {
        startJamming()
      }
    })


  </script>

</body>

</html>
