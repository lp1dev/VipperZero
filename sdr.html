<!DOCTYPE html>
<html>

<head>
  <title>Vipper Zero</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div id="header-container">
    <div id="header">
      Vipper Zero | Version 00.01 | Battery 100%
    </div>
  </div>
  <div id="notification"></div>

  <div id="container-small" class="inline">
    <div id="menu">
      <div class="button-container" id="menuitem0" style="background-color: #f06901">
        <button class="menu-button">Payload 1</button>

      </div>
      <div class="button-container" id="menuitem1">
        <button class="menu-button">Payload 2</button>

      </div>
      <div class="button-container" id="menuitem2">
        <button class="menu-button">Payload 3</button>
      </div>

      <div class="button-container" id="menuitem3">
        <button class="menu-button">Payload 4</button>
      </div>

  </div>

  </div>


  <div id="footer">
    Pre-Release Version | Not production-ready
  </div>

  <script type="text/javascript">
    var menu_selected = 0
    var SDR = undefined;

    function menu_move(direction) {
      var max_items = 3
      // Because we have 4 items in the menu

      var selected_item = document.getElementById('menuitem'+menu_selected)
      selected_item.style.backgroundColor = '#61573a'

      if (direction === "UP") {
        sdr_init()
        menu_selected = (menu_selected > 0) ? menu_selected - 1 : max_items
      } else {
        menu_selected = (menu_selected < max_items) ? menu_selected + 1 : 0
      }
      selected_item = document.getElementById('menuitem'+menu_selected)
      selected_item.style.backgroundColor = '#f06901'
    }

    function parse_status(status) {
        var attributes = [ "uptime_s", "cpu_mhz", "temperature", 
        "free_heap", "total_heap", "sd_present", "rx_active", 
        "jammer_active", "serial_echo" ]
        var status_obj = {}
        var value_buffer

        status = status.split('\n')
        for (var i = 1; i < status.length - 1; i++) {
            value_buffer = status[i].split(":")[1]
            if (value_buffer) {
                value_buffer = value_buffer.substr(1, value_buffer.length - 2)
                if (value_buffer == "true" || value_buffer == "false") {
                    value_buffer = (value_buffer == "true")
                } else if (!/^\d+|\.$/.test(value_buffer)) {

                } else if (parseFloat(value_buffer) != NaN) {
                    value_buffer = parseFloat(value_buffer)
                } else if (parseInt(value_buffer) != NaN) {
                    value_buffer = parseInt(value_buffer)
                }
                status_obj[attributes[i - 1]] = value_buffer
            }
        }
        return status_obj
    }

    function sdr_init() {
        var is_connected

        serial_init()
        is_connected = serial_is_connected()

        if (!is_connected) {
            document.getElementById("notification").innerText = "Error: Serial is not connected"
            return;
        } else {
            document.getElementById("notification").innerText = "Serial is connected"
        }

        var bytes_sent = serial_send("status")
        console.log("We have sent " + bytes_sent + " bytes")

        // Data receive loop to get the status from the ECRFv2
        var buffer = serial_recv(30)
        var status = buffer
        while (buffer && buffer.length) {
            buffer = serial_recv(30)
            status += buffer
        }
        console.log(parse_status(status))
    }



    document.addEventListener('keydown', function (event) {
      console.log("Key pressed", event)
      if (event.code === 1073741906) {
        menu_move("UP")
      } else if (event.code === 1073741905) {
        menu_move("DOWN")
      } else if (event.code === 27) {
        window.location = "index.html"
      }
    })

    var mapping = [
      "X",
      "CIRCLE",
      "SQUARE",
      "TRIANGLE",
      "SHARE",
      "PS",
      "OPTIONS",
      "LEFTSTICK",
      "RIGHTSTICK",
      "LEFTSHOULDER",
      "RIGHTSHOULDER",
      "DPAD_UP",
      "DPAD_DOWN",
      "DPAD_LEFT",
      "DPAD_RIGHT",
    ] // Only implemented the first 15 buttons

    document.addEventListener("gamepadconnected", function (event) {
      navigator.getGamepads()
      // To initialize the gamepad
    })

    document.addEventListener('button_press', function (event) {
      // The "button_press" event is not a classic JS event
      // but it is a custom quark optimization for the non-existent gamepad
      // button press event which usually requires a setTimeout +
      // polling of all the gamepads that is done in JS.
      if (mapping[event.code] === "DPAD_UP") {
        menu_move("UP")
      } else if (mapping[event.code] === "DPAD_DOWN") {
        menu_move("DOWN")
      } else if (mapping[event.code] == "TRIANGLE") {
        window.location = "index.html"
      }

      console.log("Button press", event)
    })

    sdr_init()

  </script>

</body>
</html>
